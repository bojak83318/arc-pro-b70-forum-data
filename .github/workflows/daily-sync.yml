name: Daily Forum Sync
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests markdownify beautifulsoup4
      - name: Run sync script
        run: python sync_posts.py
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add b70-primitive.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update forum posts (markdown): $(date +'%Y-%m-%d')" && git push)
